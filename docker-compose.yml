services:
  signalhub:
    build: .
    image: signalhub:latest
    container_name: signalhub
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Seoul
      - DB_PATH=/app/data/analysis.db
      # To reach a host-side Ollama/vLLM from Podman, prefer:
      #   http://host.containers.internal:11434/v1
      # Docker-compatible environments can also use:
      #   http://host.docker.internal:11434/v1
